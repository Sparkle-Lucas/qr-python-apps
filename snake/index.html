<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Snake — Python Mobile Web App</title>
  <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
  <style>
    :root {
      --bg: #0f1221;
      --panel: #171b31;
      --panel-2: #202749;
      --text: #eef1ff;
      --muted: #aab3d8;
      --accent: #6ce5b1;
      --danger: #ff6b6b;
      --line: #2d3664;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1b2143 0%, var(--bg) 58%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height: 100vh;
    }
    .wrap {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 14px 28px;
    }
    h1 {
      margin: 6px 0 8px;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.45;
    }
    .card {
      background: rgba(23, 27, 49, 0.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      padding: 16px;
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
    }
    .label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 5px;
    }
    .value {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .canvas-shell {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0d1d;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 10px;
      overflow: hidden;
    }
    canvas {
      width: min(92vw, 520px);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      background: #11162e;
      touch-action: none;
      image-rendering: pixelated;
      display: block;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(64px, 1fr));
      gap: 10px;
      width: min(100%, 320px);
      margin: 16px auto 8px;
    }
    .btn, .dpad button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 16px;
      min-height: 54px;
      font-size: 1rem;
      font-weight: 700;
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .btn.primary { background: var(--accent); color: #082116; border-color: transparent; }
    .btn.secondary { background: transparent; }
    .dpad { margin-top: 14px; }
    .empty { visibility: hidden; }
    #status {
      min-height: 1.5em;
      margin-top: 12px;
      color: var(--muted);
      text-align: center;
      font-size: 0.96rem;
    }
    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Snake</h1>
    <p>Built with Python in the browser. Swipe on the board or use the on-screen controls. Works well on phones.</p>

    <div class="card">
      <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat"><div class="label">Best</div><div class="value" id="best">0</div></div>
        <div class="stat"><div class="label">Speed</div><div class="value" id="speed">7</div></div>
      </div>

      <div class="canvas-shell">
        <canvas id="board" width="480" height="480"></canvas>
      </div>

      <div class="dpad controls">
        <div class="empty">•</div>
        <button id="up">↑</button>
        <div class="empty">•</div>
        <button id="left">←</button>
        <button id="down">↓</button>
        <button id="right">→</button>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="start">Start / Restart</button>
        <button class="btn secondary" id="pause">Pause</button>
      </div>

      <div id="status">Ready. Tap Start.</div>
      <div class="hint">Keyboard also works: arrow keys or WASD. The game speeds up as your score increases.</div>
    </div>

    <script type="py" src="./main.py" config="./pyscript.json"></script>
  </div>
</body>
</html>
